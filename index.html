<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ClassPoint Canva Interactive System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        body { font-family: 'Sarabun', sans-serif; }
        .dashboard-tab-active { background-color: #2563eb; color: white; }
    </style>
</head>
<body class="bg-slate-900 min-h-screen text-slate-100 flex flex-col">

    <!-- Header Navbar -->
    <header class="bg-slate-800 border-b border-slate-700 px-4 py-3 flex justify-between items-center shadow-md">
        <div class="flex items-center gap-2">
            <span class="bg-red-600 text-white text-xs font-bold px-2 py-0.5 rounded-md animate-pulse">LIVE</span>
            <h1 class="font-bold text-lg text-white">ClassPoint Canva</h1>
        </div>
        <div id="userInfoHeader" class="hidden flex items-center gap-3">
            <span id="userDisplayName" class="text-xs font-semibold text-slate-300"></span>
            <button onclick="logout()" class="text-xs bg-slate-700 hover:bg-rose-600 text-slate-200 px-3 py-1.5 rounded-lg transition-all border border-slate-600">
                <i class="fa-solid fa-arrow-right-from-bracket mr-1"></i> ออกจากระบบ
            </button>
        </div>
    </header>

    <!-- AUTHENTICATION VIEW -->
    <main id="authView" class="flex-grow flex items-center justify-center p-4">
        <div class="bg-slate-800 p-6 sm:p-8 rounded-2xl shadow-xl w-full max-w-md border border-slate-700">
            <div class="text-center mb-6">
                <div class="w-14 h-14 bg-blue-600/20 text-blue-400 rounded-full flex items-center justify-center mx-auto mb-3 text-xl border border-blue-500/30">
                    <i class="fa-solid fa-graduation-cap"></i>
                </div>
                <h2 class="text-2xl font-bold text-white">เข้าสู่ระบบห้องเรียน</h2>
                <p class="text-slate-400 text-sm mt-1">ClassPoint + Canva Interactive</p>
            </div>

            <!-- Role Selector -->
            <div class="flex border-b border-slate-700 mb-6">
                <button id="roleStudentBtn" onclick="switchRole('student')" class="flex-1 py-2 text-center text-sm font-semibold border-b-2 border-blue-500 text-blue-400">
                    <i class="fa-solid fa-user-graduate mr-1"></i> นักเรียน
                </button>
                <button id="roleTeacherBtn" onclick="switchRole('teacher')" class="flex-1 py-2 text-center text-sm font-semibold text-slate-400">
                    <i class="fa-solid fa-chalkboard-user mr-1"></i> คุณครู / ผู้สอน
                </button>
            </div>

            <!-- Student Form -->
            <form id="studentJoinForm" onsubmit="handleStudentJoin(event)" class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-slate-300 mb-1">รหัสห้องเรียน (Room Code)</label>
                    <input type="text" id="studentRoomCode" required placeholder="เช่น SHAKIR159" class="w-full px-4 py-3 rounded-xl bg-slate-900 border border-slate-700 focus:outline-none focus:border-blue-500 uppercase font-bold text-center tracking-widest text-lg text-white">
                </div>
                <div>
                    <label class="block text-sm font-medium text-slate-300 mb-1">ชื่อ-นามสกุล / ชื่อเล่น</label>
                    <input type="text" id="studentName" required placeholder="กรอกชื่อเพื่อเข้าเรียน" class="w-full px-4 py-3 rounded-xl bg-slate-900 border border-slate-700 focus:outline-none focus:border-blue-500 text-center text-white">
                </div>
                <button type="submit" class="w-full bg-blue-600 hover:bg-blue-500 text-white font-bold py-3 rounded-xl transition-all shadow-lg shadow-blue-600/30 flex items-center justify-center gap-2">
                    <span>เข้าสู่ห้องเรียน</span> <i class="fa-solid fa-arrow-right"></i>
                </button>
            </form>

            <!-- Teacher Form -->
            <div id="teacherAuthBox" class="hidden space-y-4">
                <form id="teacherLoginForm" onsubmit="handleTeacherLogin(event)" class="space-y-3">
                    <div>
                        <label class="block text-xs font-medium text-slate-300 mb-1">อีเมลครู (Email)</label>
                        <input type="email" id="teacherLoginEmail" required placeholder="teacher@school.ac.th" class="w-full px-3 py-2 rounded-lg bg-slate-900 border border-slate-700 text-sm text-white">
                    </div>
                    <div>
                        <label class="block text-xs font-medium text-slate-300 mb-1">รหัสห้องเรียน (Room Code)</label>
                        <input type="text" id="teacherRoomCode" required placeholder="เช่น SHAKIR159" class="w-full px-3 py-2 rounded-lg bg-slate-900 border border-slate-700 text-sm uppercase font-bold text-white">
                    </div>
                    <button type="submit" class="w-full bg-blue-600 hover:bg-blue-500 text-white font-bold py-2.5 rounded-xl transition-all text-sm shadow-lg shadow-blue-600/30">
                        เปิดห้องเรียนนำเสนอ
                    </button>
                </form>
            </div>
        </div>
    </main>

    <!-- TEACHER DASHBOARD VIEW -->
    <main id="teacherDashboardView" class="hidden flex-grow flex flex-col h-[calc(100vh-57px)]">
        <!-- Room Status & Student Sync Bar -->
        <div class="bg-slate-800 text-white px-4 py-2 flex justify-between items-center border-b border-slate-700">
            <div class="flex items-center gap-3">
                <span id="dashRoomBadge" class="bg-emerald-500/20 border border-emerald-500 text-emerald-400 px-3 py-0.5 rounded-full text-xs font-bold tracking-wider">ROOM: -</span>
                <span class="text-xs text-slate-300 flex items-center gap-1.5">
                    <i class="fa-solid fa-users text-blue-400"></i> นักเรียนออนไลน์: <strong id="studentCount" class="text-amber-400 text-sm">0</strong> คน
                </span>
            </div>
            
            <div id="timerCountdown" class="hidden text-amber-400 font-bold text-xs bg-amber-400/10 px-3 py-1 rounded-lg border border-amber-400/30 animate-pulse">
                ⏱️ เหลือเวลาตอบกลับ: <span id="timerSec">30</span> วินาที
            </div>
        </div>

        <!-- Presentation Canvas Area -->
        <div class="flex-grow relative bg-slate-950 flex items-center justify-center">
            <iframe id="canvaEmbedIframe" class="w-full h-full border-0 absolute inset-0" src="" allowfullscreen></iframe>
            <div id="canvaPlaceholder" class="text-center p-6 text-slate-500">
                <i class="fa-solid fa-file-powerpoint text-5xl mb-3 block opacity-50"></i>
                <p class="text-sm">วางลิงก์ Canva ด้านล่างแล้วกด "โหลดสไลด์"</p>
            </div>
        </div>

        <!-- NEW CONTROL BAR -->
        <div class="bg-slate-800 border-t border-slate-700 p-3 text-white flex flex-wrap justify-between items-center gap-3">
            <!-- Canva Link Fix Input -->
            <div class="flex items-center gap-2">
                <input type="url" id="canvaLinkInput" placeholder="วางลิงก์แชร์ Canva ที่นี่..." class="bg-slate-900 border border-slate-700 px-3 py-1.5 rounded-lg text-xs w-72 focus:outline-none focus:border-blue-500 text-white">
                <button onclick="loadCanvaSlide()" class="bg-slate-700 hover:bg-slate-600 border border-slate-600 px-3 py-1.5 rounded-lg text-xs font-semibold">โหลดสไลด์</button>
            </div>

            <!-- 4 Essential Control Buttons -->
            <div class="flex flex-wrap gap-2">
                <button onclick="sendQuestionModal()" class="bg-blue-600 hover:bg-blue-500 text-white text-xs font-semibold px-3 py-2 rounded-lg transition-all flex items-center gap-1.5 shadow-md shadow-blue-600/30">
                    <i class="fa-solid fa-paper-plane"></i> 1. ส่งคำถาม
                </button>
                <button onclick="viewAnswersModal()" class="bg-purple-600 hover:bg-purple-500 text-white text-xs font-semibold px-3 py-2 rounded-lg transition-all flex items-center gap-1.5 shadow-md shadow-purple-600/30">
                    <i class="fa-solid fa-chart-pie"></i> 2. ดูคำตอบ
                </button>
                <button onclick="startAutoCloseTimer()" class="bg-amber-600 hover:bg-amber-500 text-white text-xs font-semibold px-3 py-2 rounded-lg transition-all flex items-center gap-1.5 shadow-md shadow-amber-600/30">
                    <i class="fa-solid fa-clock"></i> 3. ปิดการตอบกลับ (30วิ)
                </button>
                <button onclick="giveStarsModal()" class="bg-emerald-600 hover:bg-emerald-500 text-white text-xs font-semibold px-3 py-2 rounded-lg transition-all flex items-center gap-1.5 shadow-md shadow-emerald-600/30">
                    <i class="fa-solid fa-star"></i> 4. ให้คะแนนดาว
                </button>
            </div>
        </div>
    </main>

    <!-- STUDENT APP VIEW -->
    <main id="studentAppView" class="hidden flex-grow p-4 flex flex-col items-center justify-center max-w-md mx-auto w-full">
        <div class="w-full bg-slate-800 p-4 rounded-xl border border-slate-700 mb-4 flex justify-between items-center shadow-md">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 bg-blue-500/20 text-blue-400 border border-blue-500/30 rounded-full flex items-center justify-center font-bold">
                    <i class="fa-solid fa-user-graduate"></i>
                </div>
                <div>
                    <h3 id="displayStudentName" class="font-bold text-white text-sm">-</h3>
                    <p id="displayStudentRoom" class="text-xs text-slate-400">ห้องเรียน: -</p>
                </div>
            </div>
            <div class="bg-amber-500/10 border border-amber-500/30 text-amber-400 px-3 py-1 rounded-full text-xs font-bold flex items-center gap-1">
                <i class="fa-solid fa-star text-amber-400"></i> <span id="studentStarsCount">0</span> ดาว
            </div>
        </div>

        <div id="studentInteractiveCard" class="w-full bg-slate-800 p-6 rounded-2xl shadow-xl border border-slate-700 text-center">
            <div id="studentWaitingBox">
                <div class="w-10 h-10 border-4 border-blue-500 border-t-transparent rounded-full animate-spin mx-auto mb-3"></div>
                <h3 class="font-bold text-slate-200">กำลังรออาจารย์เปิดคำถาม...</h3>
                <p class="text-xs text-slate-400 mt-1">ตั้งใจฟังอาจารย์นำเสนอสไลด์บนหน้าจอนะครับ</p>
            </div>

            <div id="studentMcqBox" class="hidden space-y-3">
                <h3 id="studentQTitle" class="font-bold text-white text-base mb-4 text-left">เลือกคำตอบของคุณ</h3>
                <div id="studentOptionsContainer" class="space-y-2"></div>
            </div>
        </div>
    </main>

    <script>
        const GAS_WEBAPP_URL = "https://script.google.com/macros/s/AKfycbxSaXChEbJdWowylFPTNAN8acINvBjdYTd8rAWfgZK5Gg4j7rBogaXwL8NB5pgDfuGO1g/exec"; 

        let currentRole = 'student';
        let currentRoom = '';
        let currentUser = null;
        let pollingTimer = null;
        let countdownTimer = null;

        async function apiPost(data) {
            try {
                const response = await fetch(GAS_WEBAPP_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                    body: JSON.stringify(data)
                });
                return await response.json();
            } catch (err) {
                console.error("API POST Error:", err);
                return { status: "error", message: err.toString() };
            }
        }

        async function apiGet(params) {
            try {
                const query = new URLSearchParams(params).toString();
                const response = await fetch(`${GAS_WEBAPP_URL}?${query}`);
                return await response.json();
            } catch (err) {
                console.error("API GET Error:", err);
                return { status: "error", message: err.toString() };
            }
        }

        // 1. ตัวแปลง Canva URL ให้แสดงผลใน iframe ได้จริง
        function formatCanvaUrl(url) {
            if (!url) return '';
            // ถ้าเป็นลิงก์แชร์แบบพรีเซนต์ ให้ต่อท้ายด้วย /view?embed
            if (url.includes('canva.com/design/')) {
                let cleanUrl = url.split('?')[0];
                if (!cleanUrl.endsWith('/view')) {
                    cleanUrl = cleanUrl.replace(/\/view.*$/, '');
                    cleanUrl += '/view?embed';
                } else {
                    cleanUrl += '?embed';
                }
                return cleanUrl;
            }
            return url;
        }

        function loadCanvaSlide() {
            const rawUrl = document.getElementById('canvaLinkInput').value.trim();
            if (!rawUrl) {
                Swal.fire('กรุณาวางลิงก์', 'โปรดวางลิงก์ Canva Presentation', 'warning');
                return;
            }
            const embedUrl = formatCanvaUrl(rawUrl);
            document.getElementById('canvaEmbedIframe').src = embedUrl;
            document.getElementById('canvaPlaceholder').classList.add('hidden');
        }

        // 2. การสลับสิทธิ์การใช้งาน
        function switchRole(role) {
            currentRole = role;
            if(role === 'student') {
                document.getElementById('roleStudentBtn').className = "flex-1 py-2 text-center text-sm font-semibold border-b-2 border-blue-500 text-blue-400";
                document.getElementById('roleTeacherBtn').className = "flex-1 py-2 text-center text-sm font-semibold text-slate-400";
                document.getElementById('studentJoinForm').classList.remove('hidden');
                document.getElementById('teacherAuthBox').classList.add('hidden');
            } else {
                document.getElementById('roleTeacherBtn').className = "flex-1 py-2 text-center text-sm font-semibold border-b-2 border-blue-500 text-blue-400";
                document.getElementById('roleStudentBtn').className = "flex-1 py-2 text-center text-sm font-semibold text-slate-400";
                document.getElementById('studentJoinForm').classList.add('hidden');
                document.getElementById('teacherAuthBox').classList.remove('hidden');
            }
        }

        // 3. ระบบสำหรับครูผู้สอน
        async function handleTeacherLogin(e) {
            e.preventDefault();
            const email = document.getElementById('teacherLoginEmail').value.trim();
            currentRoom = document.getElementById('teacherRoomCode').value.trim().toUpperCase();

            currentUser = { name: email.split('@')[0], email: email, role: 'teacher' };
            
            document.getElementById('authView').classList.add('hidden');
            document.getElementById('teacherDashboardView').classList.remove('hidden');
            document.getElementById('userInfoHeader').classList.remove('hidden');
            document.getElementById('userDisplayName').innerText = `👨‍🏫 ${currentUser.name}`;
            document.getElementById('dashRoomBadge').innerText = `ROOM: ${currentRoom}`;

            // เริ่ม Polling เช็กจำนวนนักเรียน real-time ทุก 3 วินาที
            pollingTimer = setInterval(syncTeacherRoomData, 3000);
            syncTeacherRoomData();
        }

        async function syncTeacherRoomData() {
            const res = await apiGet({ action: "getRoomState", roomId: currentRoom });
            if (res && res.status === "success") {
                document.getElementById('studentCount').innerText = res.studentCount || 0;
            }
        }

        // 4. ปุ่มคอนโทรลอาจารย์ทั้ง 4 ปุ่ม
        async function sendQuestionModal() {
            const { value: formValues } = await Swal.fire({
                title: '🚀 ส่งคำถามให้นักเรียน',
                background: '#1e293b',
                color: '#fff',
                html:
                    '<input id="swal-q" class="swal2-input bg-slate-900 border-slate-700 text-white text-sm" placeholder="ระบุโจทย์คำถาม">' +
                    '<select id="swal-type" class="swal2-input bg-slate-900 border-slate-700 text-white text-sm">' +
                    '<option value="MCQ">Multiple Choice (4 ตัวเลือก)</option>' +
                    '<option value="ShortAnswer">พิมพ์ตอบสั้น</option>' +
                    '</select>',
                focusConfirm: false,
                showCancelButton: true,
                confirmButtonText: 'ส่งคำถามทันที',
                preConfirm: () => {
                    return {
                        title: document.getElementById('swal-q').value,
                        type: document.getElementById('swal-type').value
                    }
                }
            });

            if (formValues && formValues.title) {
                Swal.fire({ title: 'กำลังส่งคำถาม...', didOpen: () => Swal.showLoading() });
                await apiPost({
                    action: "controlRoom",
                    roomId: currentRoom,
                    status: "open",
                    type: formValues.type,
                    questionData: { title: formValues.title, options: ["A", "B", "C", "D"] }
                });
                Swal.fire('สำเร็จ!', 'ส่งคำถามไปยังหน้าจอนักเรียนแล้ว', 'success');
            }
        }

        async function viewAnswersModal() {
            Swal.fire({ title: 'กำลังโหลดคำตอบ...', didOpen: () => Swal.showLoading() });
            const res = await apiGet({ action: "getAnswers", roomId: currentRoom });
            
            if (res && res.answers) {
                let html = '<div class="text-left space-y-2 max-h-60 overflow-y-auto">';
                if (res.answers.length === 0) {
                    html += '<p class="text-center text-slate-400 text-sm">ยังไม่มีนักเรียนตอบกลับมา</p>';
                } else {
                    res.answers.forEach((ans, idx) => {
                        html += `<div class="bg-slate-900 p-2 rounded border border-slate-700 text-xs flex justify-between">
                            <span>นักเรียน ID: ${ans.studentId}</span>
                            <strong class="text-amber-400">ตอบ: ${ans.answer}</strong>
                        </div>`;
                    });
                }
                html += '</div>';

                Swal.fire({
                    title: '📊 สรุปคำตอบนักเรียน',
                    background: '#1e293b',
                    color: '#fff',
                    html: html,
                    confirmButtonText: 'ปิด'
                });
            }
        }

        function startAutoCloseTimer() {
            let sec = 30;
            const timerBox = document.getElementById('timerCountdown');
            const timerSec = document.getElementById('timerSec');
            timerBox.classList.remove('hidden');
            timerSec.innerText = sec;

            if (countdownTimer) clearInterval(countdownTimer);

            countdownTimer = setInterval(async () => {
                sec--;
                timerSec.innerText = sec;
                if (sec <= 0) {
                    clearInterval(countdownTimer);
                    timerBox.classList.add('hidden');
                    // ปิดการรับคำตอบอัตโนมัติ
                    await apiPost({ action: "controlRoom", roomId: currentRoom, status: "closed" });
                    Swal.fire('หมดเวลา!', 'ระบบปิดการรับคำตอบเรียบร้อยแล้ว', 'info');
                }
            }, 1000);
        }

        function giveStarsModal() {
            Swal.fire({
                title: '⭐ ให้คะแนนดาวนักเรียน',
                text: 'มอบ 1 ดาวให้คำตอบที่ถูกต้องทั้งหมด',
                icon: 'success',
                background: '#1e293b',
                color: '#fff',
                confirmButtonText: 'ยืนยันแจกดาว'
            });
        }

        // 5. ระบบสำหรับนักเรียน
        async function handleStudentJoin(e) {
            e.preventDefault();
            currentRoom = document.getElementById('studentRoomCode').value.trim().toUpperCase();
            const name = document.getElementById('studentName').value.trim();

            Swal.fire({ title: 'กำลังเข้าสู่ห้องเรียน...', didOpen: () => Swal.showLoading() });

            const res = await apiPost({ action: "joinRoom", roomId: currentRoom, studentName: name });

            Swal.close();
            if(res.status === "success" || res.studentId) {
                currentUser = { id: res.studentId, name: name, role: 'student' };
                document.getElementById('authView').classList.add('hidden');
                document.getElementById('studentAppView').classList.remove('hidden');
                document.getElementById('userInfoHeader').classList.remove('hidden');
                document.getElementById('userDisplayName').innerText = `🎓 ${name}`;
                document.getElementById('displayStudentName').innerText = name;
                document.getElementById('displayStudentRoom').innerText = `ห้องเรียน: ${currentRoom}`;

                // เช็คสถานะห้องจากฝั่งครูทุก 2 วินาที
                pollingTimer = setInterval(checkStudentRoomStatus, 2000);
            }
        }

        async function checkStudentRoomStatus() {
            const res = await apiGet({ action: "getRoomState", roomId: currentRoom });
            if (res && res.roomInfo && res.roomInfo.status === "open") {
                const q = res.roomInfo.questionData;
                document.getElementById('studentWaitingBox').classList.add('hidden');
                document.getElementById('studentMcqBox').classList.remove('hidden');
                document.getElementById('studentQTitle').innerText = q ? q.title : 'กรุณาเลือกคำตอบ';

                const container = document.getElementById('studentOptionsContainer');
                container.innerHTML = '';
                const opts = ["A", "B", "C", "D"];
                opts.forEach((label) => {
                    container.innerHTML += `
                        <button onclick="submitStudentAnswer('${label}')" class="w-full bg-slate-900 hover:bg-blue-600/30 border border-slate-700 hover:border-blue-500 font-bold text-white py-3 px-4 rounded-xl text-left flex items-center gap-3 transition-all">
                            <span class="w-7 h-7 rounded-lg bg-blue-600 text-white flex items-center justify-center text-xs font-bold">${label}</span>
                            <span>ตัวเลือก ${label}</span>
                        </button>
                    `;
                });
            } else {
                document.getElementById('studentMcqBox').classList.add('hidden');
                document.getElementById('studentWaitingBox').classList.remove('hidden');
            }
        }

        async function submitStudentAnswer(ans) {
            Swal.fire({ title: 'กำลังส่งคำตอบ...', didOpen: () => Swal.showLoading() });
            await apiPost({ action: "submitAnswer", roomId: currentRoom, studentId: currentUser.id, answer: ans });
            Swal.fire('ส่งคำตอบแล้ว!', `คุณเลือกข้อ ${ans}`, 'success');
            document.getElementById('studentMcqBox').classList.add('hidden');
            document.getElementById('studentWaitingBox').classList.remove('hidden');
        }

        function logout() {
            if(pollingTimer) clearInterval(pollingTimer);
            if(countdownTimer) clearInterval(countdownTimer);
            location.reload();
        }
    </script>
</body>
</html>
